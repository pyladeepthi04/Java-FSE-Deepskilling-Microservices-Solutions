spring.application.name=api-gateway

server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webmvc.routes[0].id=greet-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://GREET-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/greet/**